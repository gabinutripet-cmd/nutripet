<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriPet — Exportar Plano Nutricional</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@flaticon/flaticon-uicons@3.3.1/css/regular/rounded.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --green:#2EBD6B;--green-light:#E6F9EF;--green-mid:#1F9B54;--green-dark:#146638;
  --purple:#9B59D4;--purple-light:#F3EAFD;--purple-mid:#7B3FB8;
  --bg:#F4F3EE;--surface:#fff;--border:rgba(0,0,0,0.09);--border-md:rgba(0,0,0,0.16);
  --text:#111110;--text-2:#52524E;--text-3:#A8A8A2;
  --red:#C0392B;--red-light:#FDECEA;
  --radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
.app{display:flex;min-height:100vh;}

/* SIDEBAR CONFIGURAÇÃO */
.config-panel{width:380px;min-width:380px;background:var(--surface);border-right:1.5px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;position:sticky;top:0;}
.config-header{padding:24px 24px 20px;border-bottom:1.5px solid var(--border);}
.config-header h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px;}
.config-header p{font-size:12px;color:var(--text-3);margin-top:4px;}
.config-body{padding:20px 24px;flex:1;}
.section{margin-bottom:24px;}
.section-title{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:12px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border-md);border-radius:var(--radius);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);appearance:none;}
.field textarea{resize:vertical;min-height:80px;line-height:1.5;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(46,189,107,.14);}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--radius);font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid var(--border-md);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;width:100%;justify-content:center;}
.btn-primary{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 2px 8px rgba(46,189,107,.35);margin-top:8px;}
.btn-primary:hover{background:var(--green-mid);}
.btn:hover{background:var(--bg);}
.btn-sm{padding:6px 12px;font-size:12px;width:auto;}

/* SELEÇÃO DE DIETAS */
.dieta-check{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:all .15s;}
.dieta-check:hover{border-color:var(--green);}
.dieta-check.checked{border-color:var(--green);background:var(--green-light);}
.dieta-check input[type=checkbox]{accent-color:var(--green);width:16px;height:16px;flex-shrink:0;}
.dieta-check-label{font-size:13px;font-weight:500;}
.dieta-check-sub{font-size:11px;color:var(--text-3);margin-top:2px;}

/* PREVIEW */
.preview-area{flex:1;padding:32px;overflow-y:auto;background:var(--bg);}
.preview-title{font-size:13px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:20px;display:flex;align-items:center;gap:8px;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text-3);gap:10px;font-size:14px;}
.spinner{width:20px;height:20px;border:2.5px solid var(--border-md);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green-mid);color:#fff;padding:14px 20px;border-radius:var(--radius);font-size:13.5px;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:slideUp .2s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ═══════════════════════════════════════
   PDF TEMPLATE
   ═══════════════════════════════════════ */
#pdf-template{width:794px;background:#fff;margin:0 auto;}

.pdf-page{width:794px;min-height:1123px;background:#fff;position:relative;overflow:hidden;page-break-after:always;}

/* CAPA */
.capa{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:1123px;position:relative;text-align:center;padding:60px 80px;}
.capa-wave-top{position:absolute;top:0;right:0;width:320px;}
.capa-circles{position:absolute;bottom:80px;left:40px;}
.capa-logo-icon{font-size:48px;margin-bottom:12px;}
.capa-marca{font-size:42px;font-weight:800;color:var(--green);letter-spacing:-.02em;font-family:'DM Sans',sans-serif;}
.capa-sub{font-size:18px;color:var(--text-3);margin-top:6px;letter-spacing:.04em;}
.capa-divider{width:60px;height:3px;background:var(--purple-light);margin:40px auto;}
.capa-tipo{font-size:22px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:.04em;line-height:1.3;}
.capa-feito{font-size:14px;color:var(--text-2);margin-top:16px;letter-spacing:.06em;text-transform:uppercase;}
.capa-petname{font-size:56px;font-weight:800;color:var(--purple);font-style:italic;margin-top:8px;letter-spacing:-.02em;}
.capa-aviso{position:absolute;bottom:32px;font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em;font-weight:600;text-align:center;width:100%;}

/* FICHA */
.ficha-page{padding:48px 56px;}
.ficha-inner{display:flex;gap:32px;margin-bottom:32px;}
.ficha-foto{width:220px;flex-shrink:0;}
.ficha-foto-img{width:220px;height:220px;object-fit:cover;border-radius:16px;border:3px solid var(--green-light);}
.ficha-foto-placeholder{width:220px;height:220px;border-radius:16px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:80px;border:3px solid var(--green-light);}
.ficha-dados{flex:1;}
.ficha-nome{font-size:36px;font-weight:800;color:var(--purple);font-style:italic;margin-bottom:16px;padding-bottom:10px;border-bottom:2px dashed var(--purple-light);}
.ficha-row{display:flex;align-items:baseline;gap:8px;padding:7px 0;border-bottom:1px dashed rgba(0,0,0,0.07);}
.ficha-label{font-size:12px;color:var(--text-3);font-style:italic;min-width:60px;}
.ficha-value{font-size:14px;font-weight:600;color:var(--text);}
.ficha-desc{background:var(--green-light);border-radius:12px;padding:16px 20px;font-size:13px;color:var(--green-dark);line-height:1.7;margin-top:0;}
.ficha-desc-full{margin-top:24px;}

/* CARDÁPIO PAGE */
.cardapio-page{padding:40px 56px;}
.cp-numero{font-size:52px;font-weight:800;text-transform:uppercase;color:var(--text);letter-spacing:-.02em;line-height:1;}
.cp-nome-criativo{font-size:18px;font-style:italic;color:var(--purple);margin-top:4px;margin-bottom:24px;}
.cp-section-label{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.cp-ingredientes-box{background:var(--purple-light);border-radius:12px;padding:20px 24px;margin-bottom:24px;}
.cp-ingredientes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cp-ingrediente-item{font-size:13px;color:var(--purple-mid);}
.cp-porcao-cols{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;}
.cp-porcao-lista{list-style:none;}
.cp-porcao-item{display:flex;align-items:baseline;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);}
.cp-porcao-item:last-child{border-bottom:none;}
.cp-porcao-nome{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.cp-porcao-g{font-size:13px;color:var(--text-2);font-family:'DM Mono',monospace;white-space:nowrap;}
.cp-garantias-box{background:var(--purple-light);border-radius:12px;padding:16px 20px;}
.cp-garantias-title{font-size:11px;font-weight:700;text-align:center;color:var(--purple-mid);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.cp-garantias-table{width:100%;border-collapse:collapse;font-size:11.5px;}
.cp-garantias-table td{padding:4px 6px;color:var(--purple-dark);}
.cp-garantias-table td:nth-child(2){text-align:center;color:var(--text-3);}
.cp-garantias-table td:last-child{text-align:right;font-family:'DM Mono',monospace;font-weight:600;}
.cp-garantias-table tr:not(:last-child) td{border-bottom:1px solid rgba(155,89,212,.15);}
.cp-recomendacao{margin-top:20px;padding:16px 20px;background:var(--green-light);border-radius:12px;}
.cp-rec-title{font-size:14px;font-weight:800;text-transform:uppercase;color:var(--green-dark);letter-spacing:.05em;margin-bottom:8px;}
.cp-rec-text{font-size:12.5px;color:var(--text-2);line-height:1.7;}
.cp-rec-text strong{color:var(--text);}
.cp-rec-aviso{font-size:11.5px;font-weight:700;color:var(--text);text-align:center;margin-top:10px;}

/* ÁGUA */
.agua-page{padding:40px 56px;}
.agua-hero{display:flex;align-items:stretch;gap:0;border-radius:20px;overflow:hidden;margin-bottom:32px;}
.agua-left{background:var(--blue,#2471A3);padding:40px;display:flex;flex-direction:column;justify-content:center;width:240px;}
.agua-left-title{font-size:32px;font-weight:800;text-transform:uppercase;color:#fff;line-height:1.1;}
.agua-right{background:var(--purple-light);flex:1;padding:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.agua-rec-label{font-size:13px;font-weight:600;color:var(--purple-mid);text-transform:uppercase;letter-spacing:.06em;}
.agua-rec-label2{font-size:11px;color:var(--purple-mid);margin-bottom:8px;}
.agua-valor{font-size:72px;font-weight:800;color:var(--purple-mid);font-family:'DM Mono',monospace;line-height:1;}
.agua-unit{font-size:20px;color:var(--purple-mid);font-style:italic;}
.agua-obs-box{background:var(--blue-light,#EAF4FB);border-radius:12px;padding:20px 24px;margin-bottom:24px;}
.agua-obs-text{font-size:12.5px;color:var(--text-2);line-height:1.8;}
.agua-obs-section{margin-top:16px;}
.agua-obs-title{font-size:14px;font-weight:800;text-transform:uppercase;color:var(--text);letter-spacing:.05em;margin-bottom:8px;}

/* PRÓPOLIS / ÔMEGA */
.supl-page{padding:40px 56px;}
.supl-block{background:var(--green-light);border-radius:16px;padding:28px 32px;margin-bottom:24px;border-left:5px solid var(--green);}
.supl-title{font-size:22px;font-weight:800;text-transform:uppercase;color:var(--green-dark);letter-spacing:.04em;margin-bottom:6px;}
.supl-subtitle{font-size:13px;color:var(--green-mid);margin-bottom:16px;font-style:italic;}
.supl-body{font-size:13px;color:var(--text-2);line-height:1.8;}
.supl-destaque{font-size:16px;font-weight:700;color:var(--green-dark);background:#fff;border-radius:10px;padding:12px 16px;margin-top:12px;display:inline-block;}
.supl-block-purple{background:var(--purple-light);border-left-color:var(--purple);}
.supl-block-purple .supl-title{color:var(--purple-dark);}
.supl-block-purple .supl-subtitle{color:var(--purple-mid);}
.supl-block-purple .supl-body{color:var(--text-2);}
.supl-block-purple .supl-destaque{color:var(--purple-dark);}

/* ORIENTAÇÕES */
.orient-page{padding:40px 56px;}
.orient-title{font-size:36px;font-weight:800;text-transform:uppercase;color:var(--text);letter-spacing:-.01em;margin-bottom:6px;}
.orient-sub{font-size:14px;color:var(--text-3);font-style:italic;margin-bottom:32px;}
.orient-block{display:flex;gap:20px;margin-bottom:24px;align-items:flex-start;}
.orient-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:24px;}
.orient-icon-green{background:var(--green-light);}
.orient-icon-purple{background:var(--purple-light);}
.orient-block-text{flex:1;}
.orient-block-title{font-size:14px;font-weight:800;text-transform:uppercase;color:var(--text);letter-spacing:.04em;margin-bottom:6px;}
.orient-block-body{font-size:12.5px;color:var(--text-2);line-height:1.8;}
.orient-importante{background:var(--purple-light);border-radius:10px;padding:10px 14px;margin-top:10px;font-size:12px;color:var(--purple-mid);font-style:italic;font-weight:600;}
.orient-importante-green{background:var(--green-light);color:var(--green-dark);}

/* TEMPEROS */
.temperos-page{padding:40px 56px;}
.tempero-block{background:var(--purple-light);border-radius:12px;padding:16px 20px;margin-bottom:14px;}
.tempero-header{display:flex;align-items:baseline;gap:12px;margin-bottom:8px;}
.tempero-nome{font-size:18px;font-weight:800;text-transform:uppercase;color:var(--purple);letter-spacing:.03em;}
.tempero-dose{font-size:13px;color:var(--purple-mid);font-style:italic;}
.tempero-lista{list-style:none;}
.tempero-lista li{font-size:12.5px;color:var(--purple-dark);padding:3px 0;display:flex;align-items:baseline;gap:6px;}
.tempero-lista li::before{content:'•';color:var(--purple);font-weight:700;flex-shrink:0;}

/* RODAPÉ */
.pdf-footer{display:flex;align-items:center;justify-content:center;gap:12px;padding:16px 56px;background:var(--surface);border-top:1.5px solid var(--border);font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.pdf-footer-brand{font-size:13px;font-weight:800;color:var(--green);}

/* SVG DECORATIVO */
.wave-svg{display:block;}
</style>
</head>
<body>
<div class="app">

  <!-- PAINEL DE CONFIGURAÇÃO -->
  <div class="config-panel">
    <div class="config-header">
      <h1><i class="fi fi-rr-document" style="color:var(--green)"></i> Exportar Plano Nutricional</h1>
      <p id="config-pet-nome">Carregando...</p>
    </div>
    <div class="config-body">

      <div class="section">
        <div class="section-title">Personalização do pet</div>
        <div class="field">
          <label>Descrição personalizada do pet</label>
          <textarea id="cfg-descricao" placeholder="Ex: Cachorrinha alegre e super companheira. A Lilica não é fã da ração e apresenta alergia alimentar..." rows="4"></textarea>
        </div>
        <div class="field">
          <label>Decisão clínica (opcional)</label>
          <textarea id="cfg-decisao" placeholder="Ex: Optamos pela alimentação natural (dieta caseira cozida), com cardápios especiais que ajudem na saúde e bem estar..." rows="3"></textarea>
        </div>
        <div class="field">
          <label>Observação final</label>
          <input type="text" id="cfg-obs-final" placeholder="Ex: A Lilica adora inhame :)">
        </div>
      </div>

      <div class="section">
        <div class="section-title">Selecionar dietas</div>
        <div id="cfg-dietas-lista">
          <div class="loading"><div class="spinner"></div> Carregando...</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Ômega 3</div>
        <div class="field">
          <label>Produto recomendado</label>
          <input type="text" id="cfg-omega-produto" placeholder="Ex: Ograx-3 500 / Vitafor EPA DHA">
        </div>
        <div class="field">
          <label>Posologia</label>
          <input type="text" id="cfg-omega-dose" placeholder="Ex: Oferecer 1 cápsula 2x por semana">
        </div>
        <div class="field">
          <label>Observação extra</label>
          <textarea id="cfg-omega-obs" placeholder="Ex: Pode oferecer a cápsula diretamente como petisco..." rows="3"></textarea>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Orientações de preparo</div>
        <div class="field">
          <label>Legumes</label>
          <textarea id="cfg-orient-legumes" rows="3">Usar sempre legumes frescos, lavar muito bem antes do preparo e remover totalmente as cascas para seu Pet conseguir absorver melhor os nutrientes e não correr riscos de intoxicação.</textarea>
        </div>
        <div class="field">
          <label>Importante (legumes)</label>
          <input type="text" id="cfg-orient-legumes-imp" value="Sempre oferecer os legumes COZIDOS, nunca cru!">
        </div>
        <div class="field">
          <label>Carnes</label>
          <textarea id="cfg-orient-carnes" rows="3">Comprar em locais de confiança e qualidade. Não temperar durante o preparo, basta apenas um pouco de água para o cozimento do alimento.</textarea>
        </div>
        <div class="field">
          <label>Importante (carnes)</label>
          <input type="text" id="cfg-orient-carnes-imp" value="Nunca descongelar diretamente no microondas ou fora da geladeira!">
        </div>
        <div class="field">
          <label>Grãos</label>
          <textarea id="cfg-orient-graos" rows="3">Para melhorar a digestão e a absorção dos nutrientes dos grãos, sempre lavar e, se possível, deixar de molho antes do preparo.</textarea>
        </div>
        <div class="field">
          <label>Importante (grãos)</label>
          <input type="text" id="cfg-orient-graos-imp" value="Apesar de ser comum para nós, não deve ser temperado!">
        </div>
        <div class="field">
          <label>Óleo e Sal</label>
          <textarea id="cfg-orient-oleo" rows="4">Estes ingredientes quando prescritos nas dietas, não são utilizados como tempero para preparo dos alimentos. Eles fazem parte da dieta e devem ser adicionados e misturados aos alimentos já prontos, isto é, ao servir para o seu Pet. Assim, todas as características nutricionais vão ser mantidas.</textarea>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Temperos e saúde</div>
        <div id="cfg-temperos">
          <div class="field">
            <label>Manjericão — dose</label>
            <input type="text" id="cfg-manj-dose" value="2g/dia">
          </div>
          <div class="field">
            <label>Coentro — dose</label>
            <input type="text" id="cfg-coentro-dose" value="2g/dia">
          </div>
          <div class="field">
            <label>Hortelã — dose</label>
            <input type="text" id="cfg-hortelã-dose" value="2g/dia">
          </div>
          <div class="field">
            <label>Salsinha — dose</label>
            <input type="text" id="cfg-salsinha-dose" value="2g/dia">
          </div>
        </div>
      </div>

      <button class="btn btn-primary" onclick="gerarPDF()">
        <i class="fi fi-rr-file-download"></i> Gerar PDF
      </button>
      <button class="btn" style="margin-top:8px" onclick="window.close()">
        <i class="fi fi-rr-arrow-left"></i> Voltar
      </button>

    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-area">
    <div class="preview-title"><i class="fi fi-rr-eye"></i> Pré-visualização</div>
    <div id="pdf-template">
      <div class="loading"><div class="spinner"></div> Carregando dados...</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ── STATE ──
let dadosExport = null
let dietasSelecionadas = new Set()

// ── AUTENTICAÇÃO ──
let supabaseClient = null

async function initAuth() {
  const petId = new URLSearchParams(location.search).get('pet')
  if (!petId) { alert('Pet não informado.'); return }

  let cfg
  try { cfg = await fetch('/api/config').then(r => r.json()) }
  catch(e) { mostrarErroAuth('Não foi possível conectar ao servidor.'); return }
  if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) { mostrarErroAuth('Configuração de login ausente no servidor.'); return }

  supabaseClient = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey)
  const { data: { session } } = await supabaseClient.auth.getSession()
  if (!session) { mostrarErroAuth('Você precisa entrar antes de exportar o plano.'); return }

  carregarDados(petId, session.access_token)
}

function mostrarErroAuth(msg) {
  document.getElementById('pdf-template').innerHTML = `
    <div class="loading" style="flex-direction:column;gap:14px">
      <div>${msg}</div>
      <a href="/" class="btn btn-primary" style="width:auto">Ir para o login</a>
    </div>`
}

async function carregarDados(petId, token) {
  try {
    const res = await fetch(`/api/pets/${petId}/exportar`, {
      headers: token ? { 'Authorization': `Bearer ${token}` } : {}
    })
    if (res.status === 401 || res.status === 403) {
      const b = await res.json().catch(() => ({}))
      mostrarErroAuth(b.error || 'Sessão expirada ou acesso não autorizado.')
      return
    }
    dadosExport = await res.json()
    const { pet, consultas } = dadosExport

    document.getElementById('config-pet-nome').textContent = `${pet.nome_pet} · Tutor: ${pet.nome_tutor}`
    document.title = `NutriPet — Plano de ${pet.nome_pet}`

    // Montar lista de dietas
    const dietasUnicas = []
    const idsVistos = new Set()
    for (const c of consultas) {
      if (c.dieta && !idsVistos.has(c.dieta_id)) {
        idsVistos.add(c.dieta_id)
        dietasUnicas.push({ consulta: c, dieta: c.dieta })
        dietasSelecionadas.add(c.dieta_id)
      }
    }

    const listaEl = document.getElementById('cfg-dietas-lista')
    if (!dietasUnicas.length) {
      listaEl.innerHTML = '<p style="font-size:12px;color:var(--text-3)">Nenhuma consulta com dieta associada.</p>'
    } else {
      listaEl.innerHTML = dietasUnicas.map(({ consulta: c, dieta: d }) => `
        <div class="dieta-check checked" id="check-wrap-${d.id}" onclick="toggleDieta('${d.id}')">
          <input type="checkbox" id="check-${d.id}" checked onchange="event.stopPropagation()">
          <div>
            <div class="dieta-check-label">${d.nome}</div>
            <div class="dieta-check-sub">${c.peso_consulta}kg · ${c.consumo_g ? c.consumo_g.toFixed(0)+'g/dia' : ''} · ${c.refeicoes_dia || 2}x/dia</div>
          </div>
        </div>`).join('')
    }

    renderPreview()
  } catch(e) {
    console.error(e)
    document.getElementById('pdf-template').innerHTML = '<div class="loading">Erro ao carregar dados.</div>'
  }
}

function toggleDieta(id) {
  if (dietasSelecionadas.has(id)) dietasSelecionadas.delete(id)
  else dietasSelecionadas.add(id)
  const wrap = document.getElementById(`check-wrap-${id}`)
  const chk  = document.getElementById(`check-${id}`)
  wrap.classList.toggle('checked', dietasSelecionadas.has(id))
  chk.checked = dietasSelecionadas.has(id)
  renderPreview()
}

// ── GERAR PDF ──
async function gerarPDF() {
  if (!dadosExport) return
  const btn = document.querySelector('.btn-primary')
  btn.innerHTML = '<div class="spinner" style="border-top-color:#fff"></div> Gerando PDF...'
  btn.disabled = true

  try {
    const { jsPDF } = window.jspdf
    const el = document.getElementById('pdf-template')
    const pages = el.querySelectorAll('.pdf-page')
    const pdf = new jsPDF({ orientation:'portrait', unit:'px', format:[794,1123], compress:true })

    for (let i = 0; i < pages.length; i++) {
      const canvas = await html2canvas(pages[i], {
        scale: 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        width: 794,
        height: 1123,
      })
      const imgData = canvas.toDataURL('image/jpeg', 0.92)
      if (i > 0) pdf.addPage([794, 1123], 'portrait')
      pdf.addImage(imgData, 'JPEG', 0, 0, 794, 1123)
    }

    const nomePet = dadosExport.pet?.nome_pet || 'Pet'
    pdf.save(`Plano_Nutricional_${nomePet.replace(/\s+/g,'_')}.pdf`)
    mostrarToast('PDF gerado!')
  } catch(e) {
    console.error(e)
    mostrarToast('Erro ao gerar PDF. Tente novamente.', true)
  } finally {
    btn.innerHTML = '<i class="fi fi-rr-file-download"></i> Gerar PDF'
    btn.disabled = false
  }
}

function mostrarToast(msg, err=false) {
  const t = document.createElement('div')
  t.className = 'toast'
  t.style.background = err ? '#C0392B' : '#1F9B54'
  t.innerHTML = `<i class="fi ${err?'fi-rr-cross':'fi-rr-check'}"></i>${msg}`
  document.body.appendChild(t)
  setTimeout(() => t.remove(), 3500)
}
